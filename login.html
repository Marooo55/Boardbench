<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Welcome to BoardBench — sign up or continue as a guest to explore electronics comparisons.">
  <title>Welcome — BoardBench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <div class="login-card__logo">⚡</div>
      <h1 class="login-card__title">Welcome to <span class="highlight">BoardBench</span></h1>
      <p class="login-card__desc">
        Sign up to get started, or continue as a guest to explore hardware comparisons.
      </p>

      <form id="loginForm">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter a strong password">
        </div>

        <div class="checkbox-group">
          <label>How did you hear about us?</label>
          <div class="checkbox-options">
            <label>
              <input type="checkbox" name="source" value="university"> University
            </label>
            <label>
              <input type="checkbox" name="source" value="github"> GitHub
            </label>
            <label>
              <input type="checkbox" name="source" value="social"> Social Media
            </label>
          </div>
        </div>

        <div class="btn-group">
          <button type="submit" class="btn btn--primary" id="send">Sign Up</button>
          <button type="reset" class="btn btn--outline" id="clear">Reset</button>
        </div>
      </form>

      <div class="divider">OR</div>

      <a href="index.html" class="guest-link" id="guestLink">Continue as Guest →</a>
    </div>
  </div>

  <script>
    // Mark user as visited on form submit
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      localStorage.setItem('boardbench_visited', 'true');
      window.location.href = 'index.html';
    });

    // Mark user as visited on guest link click
    document.getElementById('guestLink').addEventListener('click', function (e) {
      e.preventDefault();
      localStorage.setItem('boardbench_visited', 'true');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
